<div class="sidebar">
  <div class="sidebar-header">
    <h3>Courses</h3>
    <p class="course-count">{{ courses.length }} available</p>
  </div>

  <div class="sidebar-content">
    <!-- Categories Section -->
    <div class="categories-section">
      <h4 class="section-title">Categories</h4>
      <div class="category-list">
        <div
          *ngFor="let category of categories"
          class="category-item"
          [class.active]="selectedCategory === category"
        >
          <button
            class="category-button"
            (click)="selectCategory(category)"
          >
            <span class="category-name">{{ category }}</span>
            <span class="course-count-badge">
              {{ getCoursesByCategory(category).length }}
            </span>
          </button>

          <!-- Courses in Category -->
          <div
            class="category-courses"
            *ngIf="selectedCategory === category"
          >
            <div
              *ngFor="let course of getCoursesByCategory(category)"
              class="course-item"
            >
              <a [routerLink]="['/courses', course.id]" class="course-link">
                <div class="course-logo">{{ course.logo }}</div>
                <div class="course-item"
                >
                  <a [routerLink]="['/courses', course.id]" class="course-link">
                    <div class="course-logo">
                      <img *ngIf="course.logoUrl" [src]="course.logoUrl" [alt]="course.title + ' logo'" />
                      <ng-container *ngIf="!course.logoUrl">{{ course.logo }}</ng-container>
                    </div>
                  </span>
                </div>
                <div class="course-rating">{{ course.rating }}</div>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- All Courses Section -->
    <div class="all-courses-section">
      <h4 class="section-title">All Courses</h4>
      <div class="all-courses-list">
        <a
          *ngFor="let course of courses"
          [routerLink]="['/courses', course.id]"
          class="quick-course-link"
        >
          <span class="course-badge">
            <img *ngIf="course.logoUrl" [src]="course.logoUrl" [alt]="course.title + ' logo'" />
            <ng-container *ngIf="!course.logoUrl">{{ course.logo }}</ng-container>
          </span>
          <span class="course-title">{{ course.title }}</span>
          <span class="course-duration">{{ course.duration }}</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Sidebar Footer -->
  <div class="sidebar-footer">
    <p class="total-courses">Total: {{ courses.length }} courses</p>
    <a routerLink="/courses" class="view-all-btn">View All Courses</a>
  </div>
</div>
