<div class="sidebar">
  <div class="sidebar-header">
    <h3>Courses</h3>
    <p class="course-count">{{ courses.length }} available</p>
  </div>

  <div class="sidebar-content">
    <!-- Categories Section -->
    <div class="categories-section">
      <h4 class="section-title">Categories</h4>
      <div class="category-list">
        <div
          *ngFor="let category of categories"
          class="category-item"
          [class.active]="selectedCategory === category"
        >
          <button
            class="category-button"
            (click)="selectCategory(category)"
          >
            <span class="category-name">{{ category }}</span>
            <span class="course-count-badge">
              {{ getCoursesByCategory(category).length }}
            </span>
          </button>

          <!-- Courses in Category -->
          <div
            class="category-courses"
            *ngIf="selectedCategory === category"
          >
            <div *ngFor="let course of getCoursesByCategory(category)" class="course-item">
              <button type="button" class="course-link" (click)="openPreview(course)">
                <div class="course-logo">
                  <app-course-logo [title]="course.title" [emoji]="getEmojiForCategory(course.category)"></app-course-logo>
                </div>

                <div class="course-info">
                  <h5 class="course-title">{{ course.title }}</h5>
                  <p class="course-desc">{{ course.description }}</p>
                  <div class="course-meta">
                    <span class="course-level" [class]="'level-' + course.level.toLowerCase()">{{ course.level }}</span>
                    <span class="course-duration">{{ course.duration }}</span>
                  </div>
                </div>

                <div class="course-rating">{{ course.rating }}</div>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- All Courses Section -->
      <div class="all-courses-section">
      <h4 class="section-title">All Courses</h4>
      <div class="all-courses-list">
        <button *ngFor="let course of courses" type="button" class="quick-course-link" (click)="openPreview(course)">
          <span class="course-badge">
            <app-course-logo [title]="course.title" [emoji]="getEmojiForCategory(course.category)"></app-course-logo>
          </span>
          <div class="quick-course-info">
            <span class="course-title">{{ course.title }}</span>
            <span class="quick-course-sub">{{ course.duration }} • {{ course.rating }}</span>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- Sidebar Footer -->
  <div class="sidebar-footer">
    <p class="total-courses">Total: {{ courses.length }} courses</p>
    <a routerLink="/courses" class="view-all-btn">View All Courses</a>
  </div>
  <div class="preview-panel" *ngIf="previewCourse" role="button" tabindex="0" (click)="navigateToCourse(previewCourse)" (keydown.enter)="navigateToCourse(previewCourse)">
    <div class="preview-header">
      <div class="preview-logo">
        <app-course-logo [title]="previewCourse.title" [emoji]="getEmojiForCategory(previewCourse.category)"></app-course-logo>
      </div>
      <div class="preview-meta">
        <h4 class="preview-title">{{ previewCourse.title }}</h4>
        <div class="preview-sub">{{ previewCourse.duration }} • {{ previewCourse.level }} • {{ previewCourse.rating }}</div>
      </div>
      <button type="button" class="preview-close" (click)="closePreview(); $event.stopPropagation()">✕</button>
    </div>
    <p class="preview-desc">{{ previewCourse.description }}</p>
    <div class="preview-actions">
      <a [routerLink]="['/courses', previewCourse.id]" class="btn btn-primary" (click)="$event.stopPropagation()">View Details</a>
      <a [routerLink]="['/enroll', previewCourse.id]" class="btn btn-enroll" (click)="$event.stopPropagation()">Buy Now</a>
      <button type="button" class="btn" (click)="closePreview(); $event.stopPropagation()">Close</button>
    </div>
  </div>
</div>
