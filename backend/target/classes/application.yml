server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:elearning_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

app:
  jwt:
    secret: change-me-to-a-long-secure-secret-key-1234567890
    expiration-ms: 86400000
