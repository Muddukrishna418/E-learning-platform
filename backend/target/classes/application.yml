server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/elearning_db
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: change-me-to-a-long-secure-secret-key-1234567890
    expiration-ms: 86400000