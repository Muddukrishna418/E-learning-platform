server:
  port: ${SERVER_PORT:8082}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/elearning_db
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: change-me-to-a-long-secure-secret-key-1234567890
    expiration-ms: 86400000
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}

payu:
  merchant-key: ${PAYU_MERCHANT_KEY:test-payu-key}
  merchant-salt: ${PAYU_MERCHANT_SALT:test-payu-salt}
  base-url: ${PAYU_BASE_URL:https://test.payu.in/_payment}
  success-url: ${PAYU_SUCCESS_URL:http://localhost:8082/api/v1/payments/payu/success}
  failure-url: ${PAYU_FAILURE_URL:http://localhost:8082/api/v1/payments/payu/failure}
  currency: INR